<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo 3D v3 — Vihente</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; cursor: crosshair; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
  #caption {
    position: fixed; bottom: 26px; left: 50%;
    transform: translateX(-50%);
    font-family: monospace; font-size: 0.62rem; letter-spacing: 0.32em;
    color: rgba(0,255,255,0.32); z-index: 10; text-align: center; pointer-events: none;
  }
  #caption span { color: rgba(0,255,255,0.55); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="caption">VIHENTE &nbsp;·&nbsp; <span>3D LOGO</span> &nbsp;·&nbsp; SHADED</div>
<script>
'use strict';

// ── Canvas ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, CX, CY, R;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CX = W / 2; CY = H / 2;
  R  = Math.min(W, H) * 0.33;
}
resize();
window.addEventListener('resize', resize);

// ── Mouse ────────────────────────────────────────────────────────────────
let mxN = 0, myN = 0;
window.addEventListener('mousemove', e => {
  mxN = (e.clientX - W / 2) / (W / 2);
  myN = (e.clientY - H / 2) / (H / 2);
});

// ── 3D math ──────────────────────────────────────────────────────────────
function rotY(x, y, z, a) {
  return [x*Math.cos(a)+z*Math.sin(a), y, -x*Math.sin(a)+z*Math.cos(a)];
}
function rotX(x, y, z, a) {
  return [x, y*Math.cos(a)-z*Math.sin(a), y*Math.sin(a)+z*Math.cos(a)];
}
const CAM_Z = 5.5;
function project(x, y, z) {
  const d = CAM_Z - z;
  if (d < 0.01) return null;
  const f = CAM_Z / d;
  return [CX + x*R*f, CY - y*R*f, z];
}
function xfm(px, py, faceZ, spinA, tiltA) {
  let [x,y,z] = [px, py, faceZ];
  [x,y,z] = rotY(x,y,z, spinA);
  [x,y,z] = rotX(x,y,z, tiltA);
  return project(x, y, z);
}

// ── Geometry ─────────────────────────────────────────────────────────────
const S = 1/238;
const norm = (x,y) => [(x-500)*S, -(y-500)*S];

function cubicBezier(ax,ay,bx,by,cx,cy,dx,dy,t) {
  const u=1-t;
  return [u*u*u*ax+3*u*u*t*bx+3*u*t*t*cx+t*t*t*dx,
          u*u*u*ay+3*u*u*t*by+3*u*t*t*cy+t*t*t*dy];
}
const eyeSegs = [
  [norm(350,500),norm(390,430),norm(440,400),norm(500,400)],
  [norm(500,400),norm(560,400),norm(610,430),norm(650,500)],
  [norm(650,500),norm(610,570),norm(560,600),norm(500,600)],
  [norm(500,600),norm(440,600),norm(390,570),norm(350,500)],
];
function sampleBez(seg, n) {
  return Array.from({length:n}, (_,i) =>
    cubicBezier(...seg[0],...seg[1],...seg[2],...seg[3], i/n));
}
const EYE_PTS   = eyeSegs.flatMap(s => sampleBez(s, 28));
function circlePts(r, n) {
  return Array.from({length:n+1}, (_,i) => {
    const a = (i/n)*Math.PI*2;
    return [Math.cos(a)*r, Math.sin(a)*r];
  });
}
const IRIS_PTS  = circlePts(80*S, 56);
const PUPIL_PTS = circlePts(35*S, 40);
const RIM_PTS   = circlePts(1.0, 96);

const THICKNESS = 0.14;
const ZF =  THICKNESS / 2;
const ZB = -THICKNESS / 2;

// ── Path helper ───────────────────────────────────────────────────────────
function polyPath(pts, faceZ, spinA, tiltA, mx) {
  ctx.beginPath();
  let started = false;
  for (const [px,py] of pts) {
    const p = xfm(px*mx, py, faceZ, spinA, tiltA);
    if (!p) continue;
    if (!started) { ctx.moveTo(p[0],p[1]); started=true; }
    else ctx.lineTo(p[0],p[1]);
  }
}

// ── Lighting constants ────────────────────────────────────────────────────
// Key light: upper-left, slightly forward  L = (-0.40, 0.72, 0.57) ≈ normalised
// Blinn-Phong half-vector H = normalise(L + V), V=(0,0,1)
// H = normalise(-0.40, 0.72, 1.57), |H|≈1.773
const LX=-0.40, LY=0.72, LZ=0.57;
const HX=-0.226, HY=0.406, HZ=0.885;

// Edge quad shading: diffuse + specular from approximate Y-rotated normal
function edgeShade(nx, ny, spinA) {
  const rnx = nx*Math.cos(spinA), rny = ny, rnz = -nx*Math.sin(spinA);
  const diffuse  = Math.max(0, rnx*LX + rny*LY + rnz*LZ);
  const specDot  = Math.max(0, rnx*HX + rny*HY + rnz*HZ);
  const specular = Math.pow(specDot, 32);
  return { shade: 0.08 + diffuse*0.56 + specular*0.80, specular };
}

// ── Ambient background glow ───────────────────────────────────────────────
function drawGlow(abscos) {
  const glowR = R * (1.5 + 0.08*abscos);
  const g = ctx.createRadialGradient(CX,CY, R*0.3, CX,CY, glowR);
  g.addColorStop(0,   `rgba(0,255,255,${(0.09*abscos).toFixed(4)})`);
  g.addColorStop(0.4, `rgba(0,255,255,${(0.025*abscos).toFixed(4)})`);
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

// ── Coin face ─────────────────────────────────────────────────────────────
//
// Near face:  full dark-metal shading + gradient + shadow/glow strokes
// Ghost face: simple dark fill + dim strokes (visible through open areas)
//
function drawFace(faceZ, spinA, tiltA, isFront, eyeAlpha, isNear) {
  const mx = isFront ? 1 : -1;

  // 1 ── Dark metal disc
  polyPath(RIM_PTS, faceZ, spinA, tiltA, 1);
  ctx.closePath();
  ctx.fillStyle = '#060A11';
  ctx.fill();

  // 2 ── Directional light gradient (metallic sheen — near face only)
  //      Light from upper-left → highlight at top-left, shadow at bottom-right
  if (isNear && eyeAlpha > 0.07) {
    const c = xfm(0, 0, faceZ, spinA, tiltA);
    if (c) {
      ctx.save();
      polyPath(RIM_PTS, faceZ, spinA, tiltA, 1);
      ctx.closePath();
      ctx.clip();
      const gx = R*0.42, gy = R*0.55;
      const s  = eyeAlpha * 0.38;
      const g  = ctx.createLinearGradient(c[0]+gx, c[1]+gy, c[0]-gx, c[1]-gy);
      g.addColorStop(0,    'rgba(0,0,0,0)');
      g.addColorStop(0.38, `rgba(5,10,20,${(s*0.45).toFixed(3)})`);
      g.addColorStop(1,    `rgba(36,58,84,${s.toFixed(3)})`);
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
  }

  // 3 ── Rim stroke (glow on near face)
  const lwR = isNear ? 5.5 + eyeAlpha*4.5 : 2.5 + eyeAlpha*2.5;
  const rimA = Math.min(1, eyeAlpha * (isNear ? 1.3 : 0.85));
  if (isNear && eyeAlpha > 0.5) {
    ctx.shadowColor = 'rgba(0,255,255,0.52)';
    ctx.shadowBlur  = 11;
  }
  ctx.strokeStyle = `rgba(0,255,255,${rimA.toFixed(3)})`;
  ctx.lineWidth   = lwR;
  polyPath(RIM_PTS, faceZ, spinA, tiltA, 1);
  ctx.closePath();
  ctx.stroke();
  ctx.shadowBlur = 0;

  if (eyeAlpha < 0.025) return;

  // 4 ── Carved fills
  //      Each area is a progressively darker recess (step-depth effect)
  polyPath(EYE_PTS, faceZ, spinA, tiltA, mx);
  ctx.closePath(); ctx.fillStyle = '#030609'; ctx.fill();

  polyPath(IRIS_PTS, faceZ, spinA, tiltA, mx);
  ctx.closePath(); ctx.fillStyle = '#020407'; ctx.fill();

  polyPath(PUPIL_PTS, faceZ, spinA, tiltA, mx);
  ctx.closePath(); ctx.fillStyle = '#010305'; ctx.fill();

  // 5 ── Eye element strokes
  //      Two passes per element — path built once, stroke() called twice:
  //        Pass A: wide dark stroke + directional shadow offset → casts depth shadow
  //        Pass B: bright narrow stroke + cyan blur → light-catching edge + neon glow
  const lw = isNear ? 3.5 + eyeAlpha*4.5 : 1.8 + eyeAlpha*2.0;
  const ea  = Math.min(1, eyeAlpha * (isNear ? 1.3 : 0.85));

  const elems = [
    [EYE_PTS,   lw       ],
    [IRIS_PTS,  lw * 0.84],
    [PUPIL_PTS, lw * 0.68],
  ];

  for (const [pts, w] of elems) {
    polyPath(pts, faceZ, spinA, tiltA, mx);
    ctx.closePath();

    if (isNear && eyeAlpha > 0.25) {
      // Pass A — dark shadow (wider stroke + directional offset)
      ctx.strokeStyle   = 'rgba(0,0,10,0.55)';
      ctx.lineWidth     = w + 5;
      ctx.shadowColor   = 'rgba(0,0,0,0.72)';
      ctx.shadowBlur    = 7;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 3;
      ctx.stroke();
      ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    }

    // Pass B — bright glow (same path, no rebuild)
    if (isNear && eyeAlpha > 0.52) {
      ctx.shadowColor = 'rgba(0,255,255,0.62)';
      ctx.shadowBlur  = 13 * eyeAlpha;
    }
    ctx.strokeStyle = `rgba(0,255,255,${ea.toFixed(3)})`;
    ctx.lineWidth   = w;
    ctx.stroke();
    ctx.shadowBlur  = 0;
  }
}

// ── Coin edge — depth-sorted quads with Blinn-Phong shading ──────────────
function drawEdge(spinA, tiltA) {
  const N = 96;
  const quads = [];

  for (let i = 0; i < N; i++) {
    const a1 = (i/N)*Math.PI*2, a2 = ((i+1)/N)*Math.PI*2, am = (a1+a2)/2;
    const nx = Math.cos(am), ny = Math.sin(am);
    const normalCamZ = -nx*Math.sin(spinA);

    const c1 = xfm(Math.cos(a1),Math.sin(a1), ZF, spinA, tiltA);
    const c2 = xfm(Math.cos(a2),Math.sin(a2), ZF, spinA, tiltA);
    const c3 = xfm(Math.cos(a2),Math.sin(a2), ZB, spinA, tiltA);
    const c4 = xfm(Math.cos(a1),Math.sin(a1), ZB, spinA, tiltA);
    if (!c1||!c2||!c3||!c4) continue;

    const avgZ = (c1[2]+c2[2]+c3[2]+c4[2])/4;
    const { shade, specular } = edgeShade(nx, ny, spinA);
    quads.push({ c1,c2,c3,c4, normalCamZ, shade, specular, avgZ });
  }

  quads.sort((a,b) => a.avgZ - b.avgZ);

  for (const { c1,c2,c3,c4, normalCamZ, shade, specular } of quads) {
    const isFront = normalCamZ > 0;

    ctx.beginPath();
    ctx.moveTo(c1[0],c1[1]);
    ctx.lineTo(c2[0],c2[1]);
    ctx.lineTo(c3[0],c3[1]);
    ctx.lineTo(c4[0],c4[1]);
    ctx.closePath();

    if (isFront) {
      // Fill with slightly lit metal colour on high-specular quads
      const g = Math.round(Math.min(42, 6 + specular*38));
      ctx.fillStyle   = `rgb(0,${g},${g+3})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(0,255,255,${Math.min(0.95,shade).toFixed(3)})`;
      ctx.lineWidth   = 0.7;
      ctx.stroke();
    } else {
      // Ghost back-facing edge (faintly visible through open face)
      ctx.fillStyle   = 'rgba(0,10,14,0.22)';
      ctx.fill();
      ctx.strokeStyle = `rgba(0,255,255,${(shade*0.30).toFixed(3)})`;
      ctx.lineWidth   = 0.4;
      ctx.stroke();
    }
  }
}

// ── Render loop ───────────────────────────────────────────────────────────
let t0 = 0, smoothTilt = 0;

function loop(ts) {
  if (!t0) t0 = ts;
  const time = (ts - t0) / 1000;

  smoothTilt += (myN * 0.22 - smoothTilt) * 0.05;

  const spinA   = 0.74 * time + mxN * 0.45;
  const tiltA   = smoothTilt;
  const cosSpin = Math.cos(spinA);
  const abscos  = Math.abs(cosSpin);

  ctx.clearRect(0, 0, W, H);
  drawGlow(abscos);

  // Face F (isFront=true, z=+ZF): near when cosSpin ≥ 0
  // Face B (isFront=false, z=−ZF): near when cosSpin < 0
  // Near alpha  = |cosSpin|  (full when facing camera)
  // Ghost alpha = |cosSpin| * 0.28  (visible through open face)
  const fF_alpha  = abscos * (cosSpin >= 0 ? 1.0 : 0.28);
  const fF_isNear = cosSpin >= 0;
  const fB_alpha  = abscos * (cosSpin <  0 ? 1.0 : 0.28);
  const fB_isNear = cosSpin < 0;

  if (cosSpin >= 0) {
    drawFace(ZB, spinA, tiltA, false, fB_alpha, fB_isNear);
    drawEdge(spinA, tiltA);
    drawFace(ZF, spinA, tiltA, true,  fF_alpha, fF_isNear);
  } else {
    drawFace(ZF, spinA, tiltA, true,  fF_alpha, fF_isNear);
    drawEdge(spinA, tiltA);
    drawFace(ZB, spinA, tiltA, false, fB_alpha, fB_isNear);
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
