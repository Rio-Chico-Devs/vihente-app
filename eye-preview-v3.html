<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo 3D v3 — Vihente</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    cursor: crosshair;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #caption {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    color: rgba(0, 255, 255, 0.32);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }
  #caption span { color: rgba(0, 255, 255, 0.55); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="caption">
  VIHENTE &nbsp;·&nbsp; <span>3D LOGO</span> &nbsp;·&nbsp; COLOURED EDGE
</div>

<script>
'use strict';

// ── Canvas setup ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, CX, CY, R;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CX = W / 2;
  CY = H / 2;
  R  = Math.min(W, H) * 0.33;
}
resize();
window.addEventListener('resize', resize);

// ── Mouse ────────────────────────────────────────────────────────────────
let mxN = 0, myN = 0;
window.addEventListener('mousemove', e => {
  mxN = (e.clientX - W / 2) / (W / 2);
  myN = (e.clientY - H / 2) / (H / 2);
});

// ── 3D math ──────────────────────────────────────────────────────────────
function rotY(x, y, z, a) {
  return [x * Math.cos(a) + z * Math.sin(a),
          y,
         -x * Math.sin(a) + z * Math.cos(a)];
}
function rotX(x, y, z, a) {
  return [x,
          y * Math.cos(a) - z * Math.sin(a),
          y * Math.sin(a) + z * Math.cos(a)];
}

const CAM_Z = 5.5;
function project(x, y, z) {
  const d = CAM_Z - z;
  if (d < 0.01) return null;
  const f = CAM_Z / d;
  return [CX + x * R * f, CY - y * R * f, z];
}

function xfm(px, py, faceZ, spinA, tiltA) {
  let [x, y, z] = [px, py, faceZ];
  [x, y, z] = rotY(x, y, z, spinA);
  [x, y, z] = rotX(x, y, z, tiltA);
  return project(x, y, z);
}

// ── Eye geometry ─────────────────────────────────────────────────────────
const S    = 1 / 238;
const norm = (x, y) => [(x - 500) * S, -(y - 500) * S];

function cubicBezier(ax, ay, bx, by, cx, cy, dx, dy, t) {
  const u = 1 - t;
  return [
    u*u*u*ax + 3*u*u*t*bx + 3*u*t*t*cx + t*t*t*dx,
    u*u*u*ay + 3*u*u*t*by + 3*u*t*t*cy + t*t*t*dy,
  ];
}

const eyeSegs = [
  [norm(350,500), norm(390,430), norm(440,400), norm(500,400)],
  [norm(500,400), norm(560,400), norm(610,430), norm(650,500)],
  [norm(650,500), norm(610,570), norm(560,600), norm(500,600)],
  [norm(500,600), norm(440,600), norm(390,570), norm(350,500)],
];

function sampleBezier(seg, n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = i / n;
    pts.push(cubicBezier(...seg[0], ...seg[1], ...seg[2], ...seg[3], t));
  }
  return pts;
}

const EYE_PTS   = eyeSegs.flatMap(s => sampleBezier(s, 28));

function circlePts(r, n) {
  return Array.from({ length: n + 1 }, (_, i) => {
    const a = (i / n) * Math.PI * 2;
    return [Math.cos(a) * r, Math.sin(a) * r];
  });
}

const IRIS_PTS  = circlePts(80 * S, 56);
const PUPIL_PTS = circlePts(35 * S, 40);
const RIM_PTS   = circlePts(1.0, 96);

const THICKNESS = 0.14;
const ZF =  THICKNESS / 2;
const ZB = -THICKNESS / 2;

// ── Helpers ───────────────────────────────────────────────────────────────
function polyPath(pts, faceZ, spinA, tiltA, mirrorX) {
  ctx.beginPath();
  let started = false;
  for (const [px, py] of pts) {
    const p = xfm(px * mirrorX, py, faceZ, spinA, tiltA);
    if (!p) continue;
    if (!started) { ctx.moveTo(p[0], p[1]); started = true; }
    else ctx.lineTo(p[0], p[1]);
  }
}

// ── Ambient glow ──────────────────────────────────────────────────────────
function drawGlow(abscos) {
  const glowR = R * (1.4 + 0.06 * abscos);
  const g = ctx.createRadialGradient(CX, CY, R * 0.4, CX, CY, glowR);
  g.addColorStop(0,   `rgba(0,255,255,${(0.065 * abscos).toFixed(4)})`);
  g.addColorStop(0.5, 'rgba(0,255,255,0.014)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// ── Coin face — open / hollow ─────────────────────────────────────────────
//
// No face fill. Every element is a stroke-only shape:
//   RIM    — thick outer circle (the coin border, like in the logo)
//   EYE    — thick eye outline (vesica piscis)
//   IRIS   — thick iris ring
//   PUPIL  — thick pupil ring
//
// The far face is drawn as a "ghost" (reduced alpha) so it's visible
// through the open face, giving true depth parallax as the coin spins.
//
function drawFace(faceZ, spinA, tiltA, isFront, faceAlpha, isNear) {
  if (faceAlpha < 0.015) return;

  const mirrorX = isFront ? 1 : -1;

  // Near face: full brightness + glow
  // Far face (ghost): muted, no glow
  const ea   = Math.min(1, faceAlpha * (isNear ? 1.3 : 0.85));
  const lwRim = isNear ? (5.5 + faceAlpha * 4.5)  : (2.5 + faceAlpha * 2.5);
  const lwEye = isNear ? (3.5 + faceAlpha * 4.5)  : (1.8 + faceAlpha * 2.0);

  if (isNear && faceAlpha > 0.60) {
    ctx.shadowColor = 'rgba(0,255,255,0.60)';
    ctx.shadowBlur  = 13 * faceAlpha;
  }

  // ── Rim circle (the thick outer border) ──
  ctx.strokeStyle = `rgba(0,255,255,${ea.toFixed(3)})`;
  ctx.lineWidth   = lwRim;
  polyPath(RIM_PTS, faceZ, spinA, tiltA, 1);
  ctx.closePath();
  ctx.stroke();

  // ── Eye outline ──
  ctx.lineWidth = lwEye;
  polyPath(EYE_PTS, faceZ, spinA, tiltA, mirrorX);
  ctx.closePath();
  ctx.stroke();

  // ── Iris ring ──
  ctx.lineWidth = lwEye * 0.84;
  polyPath(IRIS_PTS, faceZ, spinA, tiltA, mirrorX);
  ctx.closePath();
  ctx.stroke();

  // ── Pupil ring ──
  ctx.lineWidth = lwEye * 0.68;
  polyPath(PUPIL_PTS, faceZ, spinA, tiltA, mirrorX);
  ctx.closePath();
  ctx.stroke();

  ctx.shadowBlur = 0;
}

// ── Build filled quads for any path's Z-wall ─────────────────────────────
//
// Outward normal at each segment ≈ direction of the segment midpoint from
// origin. Exact for circles; good approximation for the eye outline.
//
// closed=true wraps the last point back to the first (needed for EYE_PTS
// which has no duplicate endpoint, unlike the circle arrays).
function buildPathQuads(pts, spinA, tiltA, closed) {
  const quads = [];
  const n = pts.length;
  const count = closed ? n : n - 1;
  for (let i = 0; i < count; i++) {
    const [px0, py0] = pts[i];
    const [px1, py1] = pts[(i + 1) % n];
    const mx = (px0 + px1) / 2;
    const my = (py0 + py1) / 2;
    const mlen = Math.sqrt(mx * mx + my * my);
    if (mlen < 0.001) continue;
    const nx = mx / mlen;
    const ny = my / mlen;
    const normalCamZ = -nx * Math.sin(spinA);
    const c1 = xfm(px0, py0, ZF, spinA, tiltA);
    const c2 = xfm(px1, py1, ZF, spinA, tiltA);
    const c3 = xfm(px1, py1, ZB, spinA, tiltA);
    const c4 = xfm(px0, py0, ZB, spinA, tiltA);
    if (!c1 || !c2 || !c3 || !c4) continue;
    const avgZ = (c1[2] + c2[2] + c3[2] + c4[2]) / 4;
    const diffuse = Math.max(0, ny * 0.85 + normalCamZ * 0.32);
    const shade   = (0.10 + diffuse * 0.50) * Math.abs(normalCamZ);
    quads.push({ c1, c2, c3, c4, normalCamZ, shade, avgZ });
  }
  return quads;
}

// ── Coin edge (the cylindrical wall — the only solid part) ────────────────
//
// Draws all edge quads sorted back-to-front.
// Front-facing quads: opaque fill + bright stroke.
// Back-facing quads: very faint fill + dim stroke (visible through open face).
//
function drawEdge(spinA, tiltA) {
  const N = 96;
  const quads = [];

  // Rim quads
  for (let i = 0; i < N; i++) {
    const a1 = (i / N) * Math.PI * 2;
    const a2 = ((i + 1) / N) * Math.PI * 2;
    const am = (a1 + a2) / 2;
    const nx = Math.cos(am), ny = Math.sin(am);
    const normalCamZ = -nx * Math.sin(spinA);
    const c1 = xfm(Math.cos(a1), Math.sin(a1), ZF, spinA, tiltA);
    const c2 = xfm(Math.cos(a2), Math.sin(a2), ZF, spinA, tiltA);
    const c3 = xfm(Math.cos(a2), Math.sin(a2), ZB, spinA, tiltA);
    const c4 = xfm(Math.cos(a1), Math.sin(a1), ZB, spinA, tiltA);
    if (!c1 || !c2 || !c3 || !c4) continue;
    const avgZ = (c1[2] + c2[2] + c3[2] + c4[2]) / 4;
    const diffuse = Math.max(0, ny * 0.85 + normalCamZ * 0.32);
    const shade   = (0.10 + diffuse * 0.50) * Math.abs(normalCamZ);
    quads.push({ c1, c2, c3, c4, normalCamZ, shade, avgZ });
  }

  // Eye element quads — EYE_PTS is a closed loop with no duplicate endpoint
  for (const q of buildPathQuads(EYE_PTS,   spinA, tiltA, true))  quads.push(q);
  for (const q of buildPathQuads(IRIS_PTS,  spinA, tiltA, false)) quads.push(q);
  for (const q of buildPathQuads(PUPIL_PTS, spinA, tiltA, false)) quads.push(q);

  // Back-to-front so near quads paint over far ones
  quads.sort((a, b) => a.avgZ - b.avgZ);

  for (const { c1, c2, c3, c4, normalCamZ, shade } of quads) {
    ctx.beginPath();
    ctx.moveTo(c1[0], c1[1]);
    ctx.lineTo(c2[0], c2[1]);
    ctx.lineTo(c3[0], c3[1]);
    ctx.lineTo(c4[0], c4[1]);
    ctx.closePath();

    if (normalCamZ > 0) {
      const s  = Math.min(1, shade);
      const cg = Math.round(s * 160);
      const cb = Math.round(s * 210);
      ctx.fillStyle = `rgb(0,${cg},${cb})`;
      ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(0,20,28,0.70)';
      ctx.fill();
    }
  }
}

// ── Render loop ───────────────────────────────────────────────────────────
let t0 = 0;
let smoothTilt = 0;

function loop(ts) {
  if (!t0) t0 = ts;
  const time = (ts - t0) / 1000;

  smoothTilt += (myN * 0.22 - smoothTilt) * 0.05;

  const spinA   = 0.74 * time + mxN * 0.45;
  const tiltA   = smoothTilt;
  const cosSpin = Math.cos(spinA);
  const abscos  = Math.abs(cosSpin);

  ctx.clearRect(0, 0, W, H);
  drawGlow(abscos);

  // Each face has two alpha values:
  //   nearAlpha  — face is pointing toward camera (dominant, bright)
  //   ghostAlpha — face is pointing away, visible as ghost through open coin
  //
  // Face F (front in coin-local, z=+T/2): nearAlpha when cosSpin > 0
  // Face B (back  in coin-local, z=−T/2): nearAlpha when cosSpin < 0
  const fF_near  = Math.max(0,  cosSpin);
  const fF_ghost = Math.max(0, -cosSpin) * 0.30;
  const fF_alpha = fF_near + fF_ghost;   // exactly one is non-zero
  const fF_isNear = cosSpin >= 0;

  const fB_near  = Math.max(0, -cosSpin);
  const fB_ghost = Math.max(0,  cosSpin) * 0.30;
  const fB_alpha = fB_near + fB_ghost;
  const fB_isNear = cosSpin < 0;

  // Draw order: far face ghost → all edge quads (rim + eye walls) → near face bright
  if (cosSpin >= 0) {
    drawFace(ZB, spinA, tiltA, false, fB_alpha, fB_isNear); // far (ghost)
    drawEdge(spinA, tiltA);
    drawFace(ZF, spinA, tiltA, true,  fF_alpha, fF_isNear); // near (bright)
  } else {
    drawFace(ZF, spinA, tiltA, true,  fF_alpha, fF_isNear); // far (ghost)
    drawEdge(spinA, tiltA);
    drawFace(ZB, spinA, tiltA, false, fB_alpha, fB_isNear); // near (bright)
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
