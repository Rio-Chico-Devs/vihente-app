<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!-- I font sono auto-discoverati dal CSS bundle generato da Vite a partire dagli
         import @fontsource in main.jsx. I vecchi preload puntavano a /node_modules/...
         che esiste solo in dev → in produzione causavano 404 silenziosi. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="/favicon.svg" color="#00ffff" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title>VIHENTE - Consulenze Digitali | Web Design & Development</title>
    <meta name="title" content="VIHENTE - Consulenze Digitali | Web Design & Development" />
    <meta name="description" content="Creo la tua presenza digitale da zero, o ti aiuto a migliorare quella che già hai. Consulenze digitali professionali per web design, sviluppo web e strategie digitali." />
    <meta name="keywords" content="consulenze digitali, web design, sviluppo web, web development, presenza digitale, siti web, digital consulting, portfolio, React" />
    <meta name="author" content="VIHENTE" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Italian" />
    <meta name="revisit-after" content="7 days" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vihente.it/" />
    <meta property="og:title" content="VIHENTE - Consulenze Digitali | Web Design & Development" />
    <meta property="og:description" content="Creo la tua presenza digitale da zero, o ti aiuto a migliorare quella che già hai. Consulenze digitali professionali per web design, sviluppo web e strategie digitali." />
    <meta property="og:image" content="https://vihente.it/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="it_IT" />
    <meta property="og:site_name" content="VIHENTE" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://vihente.it/" />
    <meta property="twitter:title" content="VIHENTE - Consulenze Digitali | Web Design & Development" />
    <meta property="twitter:description" content="Creo la tua presenza digitale da zero, o ti aiuto a migliorare quella che già hai. Consulenze digitali professionali." />
    <meta property="twitter:image" content="https://vihente.it/og-image.png" />

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000" />
    <meta name="msapplication-TileColor" content="#000000" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VIHENTE" />

    <!-- Preload font critici della landing (titolo + testo above-the-fold).
         crossorigin è obbligatorio per i font, anche se same-origin. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="/fonts/orbitron/orbitron-latin-900-normal.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="/fonts/share-tech-mono/ShareTechMono-Regular.woff2" />

    <!-- Boot splash: HTML+CSS inline che appare istantaneamente, prima ancora
         che il bundle JS sia scaricato/eseguito. Evita lo schermo vuoto del
         primo avvio. main.jsx lo rimuove appena React ha montato l'app. -->
    <style>
      html, body { margin: 0; background: #000; }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 2147483647;
        transition: opacity 0.3s ease;
      }
      #boot-splash .boot-spinner {
        width: 60px;
        height: 60px;
        border: 3px solid rgba(0, 255, 255, 0.2);
        border-top-color: #00ffff;
        border-radius: 50%;
        animation: boot-spin 1s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .boot-spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
