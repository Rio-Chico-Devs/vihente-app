<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperboloid Cage — Eye Concept</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    cursor: crosshair;
  }

  /* Tre layer in profondità:
     bg-canvas (z<0)  →  eye-svg  →  fg-canvas (z≥0)
     Le linee dietro l'occhio sono dietro, quelle davanti sono davanti.
     È vero 3D, non un trucco 2D. */

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #bg-canvas { z-index: 1;  }
  #fg-canvas { z-index: 20; pointer-events: none; }

  #eye-svg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
  }

  #caption {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    color: rgba(0, 255, 255, 0.32);
    z-index: 30;
    text-align: center;
    pointer-events: none;
  }
  #caption span { color: rgba(0, 255, 255, 0.55); }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<svg id="eye-svg" viewBox="0 0 1000 1000">
  <defs>
    <filter id="g">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="ec">
      <path d="M350 500 C390 430,440 400,500 400 C560 400,610 430,650 500 C610 570,560 600,500 600 C440 600,390 570,350 500Z"/>
    </clipPath>
  </defs>
  <path d="M350 500 C390 430,440 400,500 400 C560 400,610 430,650 500 C610 570,560 600,500 600 C440 600,390 570,350 500Z"
    fill="none" stroke="rgba(0,255,255,0.95)" stroke-width="11"
    stroke-linecap="round" filter="url(#g)"/>
  <g clip-path="url(#ec)">
    <circle id="p1" cx="500" cy="500" r="80"
      fill="none" stroke="rgba(0,255,255,0.95)" stroke-width="10" filter="url(#g)"/>
    <circle id="p2" cx="500" cy="500" r="34"
      fill="none" stroke="rgba(0,255,255,0.95)" stroke-width="7" filter="url(#g)"/>
  </g>
</svg>

<canvas id="fg-canvas"></canvas>

<div id="caption">
  IPERBOLOIDE A DOPPIA RIGATURA &nbsp;·&nbsp;
  <span>x² + z² − y² = a²</span>
  &nbsp;·&nbsp; ω_spin / ω_tilt = φ
</div>

<script>
'use strict';

// ── Costanti geometriche ─────────────────────────────────────────────────
const PHI       = (1 + Math.sqrt(5)) / 2;   // sezione aurea
const N_LINES   = 22;                       // rette per famiglia
const SEGS      = 26;                       // segmenti per retta (smoothing 3D)
const A_WAIST   = 0.78;                     // raggio strozzatura (normalizzato)
const H_HALF    = 1.55;                     // semi-altezza
const FOV       = 760;                      // lunghezza focale (proiezione prospettica)
const CAM_Z     = 4.4;                      // distanza camera

// Velocità: rapporto irrazionale → mai stessa configurazione
const W_SPIN    = 0.46;                     // rotazione assiale (scivolamento rette)
const W_TILT    = 0.46 / PHI;               // basculamento (tumble) → φ⁻¹

// ── DOM ──────────────────────────────────────────────────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const fgCanvas = document.getElementById('fg-canvas');
const eyeSvg   = document.getElementById('eye-svg');
const p1       = document.getElementById('p1');
const p2       = document.getElementById('p2');
const bg       = bgCanvas.getContext('2d');
const fg       = fgCanvas.getContext('2d');

let W, H, CX, CY, SCALE;
let mx = 0, my = 0;
let tPx = 500, tPy = 500, cPx = 500, cPy = 500;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  [bgCanvas, fgCanvas].forEach(c => {
    c.width  = W * dpr;
    c.height = H * dpr;
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  });
  CX = W / 2;
  CY = H / 2;
  SCALE = Math.min(W, H) * 0.205;            // dimensione gabbia
  const eyePx = SCALE * 1.55;                // l'occhio è nel waist
  eyeSvg.style.width  = eyePx + 'px';
  eyeSvg.style.height = eyePx + 'px';
  mx = CX; my = CY;
}
resize();
window.addEventListener('resize', resize);

// ── Pupilla che segue il mouse (logica del sito) ─────────────────────────
window.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  const r    = eyeSvg.getBoundingClientRect();
  const relX = (e.clientX - r.left) / r.width  * 1000;
  const relY = (e.clientY - r.top)  / r.height * 1000;
  const dx   = relX - 500, dy = relY - 500;
  const MRX = 95, MRY = 65;
  const nd   = Math.sqrt((dx*dx)/(MRX*MRX) + (dy*dy)/(MRY*MRY));
  if (nd > 1) {
    const a = Math.atan2(dy, dx);
    tPx = 500 + Math.cos(a) * MRX;
    tPy = 500 + Math.sin(a) * MRY;
  } else { tPx = relX; tPy = relY; }
});

function pupilTick() {
  cPx += (tPx - cPx) * 0.1;
  cPy += (tPy - cPy) * 0.1;
  p1.setAttribute('cx', cPx); p1.setAttribute('cy', cPy);
  p2.setAttribute('cx', cPx); p2.setAttribute('cy', cPy);
}

// ── Proiezione prospettica 3D → 2D ───────────────────────────────────────
function project(x, y, z) {
  const dz = CAM_Z - z;
  if (dz < 0.05) return null;
  return {
    sx: CX + FOV * x / dz,
    sy: CY - FOV * y / dz,
    inv: 1 / dz,                              // più alto = più vicino
    z:   z,
  };
}

// ── Generatori dell'iperboloide x² + z² − y² = a² ───────────────────────
//
// Famiglia 1 (sign = +1):
//   x(s) = a·cos θ − s·sin θ
//   y(s) = s
//   z(s) = a·sin θ + s·cos θ
//
// Famiglia 2 (sign = −1):  rotazione opposta
//   x(s) = a·cos θ + s·sin θ
//   z(s) = a·sin θ − s·cos θ
//
// Le due famiglie costituiscono la doppia rigatura.
function buildSegments(sign, spin, tilt) {
  const cT = Math.cos(tilt), sT = Math.sin(tilt);
  const segs = [];

  for (let i = 0; i < N_LINES; i++) {
    const theta = (i / N_LINES) * Math.PI * 2 + sign * spin;
    const ct = Math.cos(theta), st = Math.sin(theta);

    let prev = null;
    for (let j = 0; j <= SEGS; j++) {
      const s = -H_HALF + (j / SEGS) * 2 * H_HALF;

      // Punto sulla retta in coord. iperboloide (asse Y)
      const x0 = A_WAIST * ct - sign * s * st;
      const y0 = s;
      const z0 = A_WAIST * st + sign * s * ct;

      // Tumble (rotazione attorno all'asse X della scena)
      const x = x0;
      const y = y0 * cT - z0 * sT;
      const z = y0 * sT + z0 * cT;

      const p = project(x * SCALE, y * SCALE, z);
      if (!p) { prev = null; continue; }

      if (prev) {
        segs.push({
          x1: prev.sx, y1: prev.sy,
          x2: p.sx,    y2: p.sy,
          inv: (prev.inv + p.inv) / 2,        // depth media (per alpha)
          z:   (prev.z   + p.z)   / 2,        // z media (per back/front)
        });
      }
      prev = p;
    }
  }
  return segs;
}

// ── Render principale ────────────────────────────────────────────────────
function render(time) {
  bg.clearRect(0, 0, W, H);
  fg.clearRect(0, 0, W, H);

  // Mouse perturba dolcemente tilt e spin (entro range piccoli)
  const mTilt = ((my - CY) / H) * 0.35;
  const mSpin = ((mx - CX) / W) * 0.40;

  const spin = W_SPIN * time + mSpin;
  const tilt = 0.34 * Math.sin(W_TILT * time) + mTilt;

  const all = [
    ...buildSegments(+1, spin, tilt),
    ...buildSegments(-1, spin, tilt),
  ];

  // Range di profondità per normalizzare l'alpha
  let invMin = Infinity, invMax = -Infinity;
  for (const s of all) {
    if (s.inv < invMin) invMin = s.inv;
    if (s.inv > invMax) invMax = s.inv;
  }
  const range = (invMax - invMin) || 1;

  // Disegna ogni segmento sul layer corretto (back se z<0, front altrimenti)
  for (const s of all) {
    const norm  = (s.inv - invMin) / range;   // 0 (lontano) → 1 (vicino)
    const alpha = 0.10 + norm * 0.78;
    const lw    = 0.5  + norm * 1.5;
    const ctx   = s.z < 0 ? bg : fg;
    ctx.strokeStyle = 'rgba(0, 255, 255, ' + alpha.toFixed(3) + ')';
    ctx.lineWidth   = lw;
    ctx.beginPath();
    ctx.moveTo(s.x1, s.y1);
    ctx.lineTo(s.x2, s.y2);
    ctx.stroke();
  }
}

// ── RAF loop ──────────────────────────────────────────────────────────────
let t0 = 0;
function loop(ts) {
  if (!t0) t0 = ts;
  const time = (ts - t0) / 1000;
  pupilTick();
  render(time);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
