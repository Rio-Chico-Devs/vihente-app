<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo 3D — Vihente</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    cursor: crosshair;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #caption {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    color: rgba(0, 255, 255, 0.32);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }
  #caption span { color: rgba(0, 255, 255, 0.55); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="caption">
  VIHENTE &nbsp;·&nbsp; <span>3D LOGO</span> &nbsp;·&nbsp; COIN FLIP
</div>

<script>
'use strict';

// ── Canvas setup ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, CX, CY, R;   // R = coin radius in px

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CX = W / 2;
  CY = H / 2;
  R  = Math.min(W, H) * 0.33;
}
resize();
window.addEventListener('resize', resize);

// ── Mouse ────────────────────────────────────────────────────────────────
let mxN = 0, myN = 0;
window.addEventListener('mousemove', e => {
  mxN = (e.clientX - W / 2) / (W / 2);
  myN = (e.clientY - H / 2) / (H / 2);
});

// ── 3D math ──────────────────────────────────────────────────────────────
// Y-axis rotation (coin's flip axis — vertical)
function rotY(x, y, z, a) {
  return [x * Math.cos(a) + z * Math.sin(a),
          y,
         -x * Math.sin(a) + z * Math.cos(a)];
}
// X-axis rotation (camera tilt driven by mouse Y)
function rotX(x, y, z, a) {
  return [x,
          y * Math.cos(a) - z * Math.sin(a),
          y * Math.sin(a) + z * Math.cos(a)];
}

const CAM_Z = 5.5;
function project(x, y, z) {
  const d = CAM_Z - z;
  if (d < 0.01) return null;
  const f = CAM_Z / d;
  return [CX + x * R * f, CY - y * R * f, z];
}

// Transform: 2D point on face plane (faceZ) → rotate → project
function xfm(px, py, faceZ, spinA, tiltA) {
  let [x, y, z] = [px, py, faceZ];
  [x, y, z] = rotY(x, y, z, spinA);
  [x, y, z] = rotX(x, y, z, tiltA);
  return project(x, y, z);
}

// ── Eye geometry (normalized to coin radius = 1) ─────────────────────────
// Source: favicon.svg — eye centered at (500,500), coin circle r=238
const S = 1 / 238;
const norm = (x, y) => [(x - 500) * S, -(y - 500) * S];

function cubicBezier(ax, ay, bx, by, cx, cy, dx, dy, t) {
  const u = 1 - t;
  return [
    u*u*u*ax + 3*u*u*t*bx + 3*u*t*t*cx + t*t*t*dx,
    u*u*u*ay + 3*u*u*t*by + 3*u*t*t*cy + t*t*t*dy,
  ];
}

// SVG path: M350 500 C390 430,440 400,500 400 C560 400,610 430,650 500
//           C610 570,560 600,500 600 C440 600,390 570,350 500 Z
const eyeSegs = [
  [norm(350,500), norm(390,430), norm(440,400), norm(500,400)],
  [norm(500,400), norm(560,400), norm(610,430), norm(650,500)],
  [norm(650,500), norm(610,570), norm(560,600), norm(500,600)],
  [norm(500,600), norm(440,600), norm(390,570), norm(350,500)],
];

function sampleBezier(seg, n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = i / n;
    pts.push(cubicBezier(...seg[0], ...seg[1], ...seg[2], ...seg[3], t));
  }
  return pts;
}

const EYE_PTS   = eyeSegs.flatMap(s => sampleBezier(s, 24));

function circlePts(r, n) {
  return Array.from({ length: n + 1 }, (_, i) => {
    const a = (i / n) * Math.PI * 2;
    return [Math.cos(a) * r, Math.sin(a) * r];
  });
}

const IRIS_PTS  = circlePts(80 * S, 52);
const PUPIL_PTS = circlePts(35 * S, 36);
const RIM_PTS   = circlePts(1.0, 96);

const THICKNESS = 0.11;    // coin depth (fraction of coin radius)
const ZF =  THICKNESS / 2; // front face z in coin-local space
const ZB = -THICKNESS / 2; // back face z

// ── Drawing helpers ──────────────────────────────────────────────────────
function polyPath(pts, faceZ, spinA, tiltA, mirrorX) {
  ctx.beginPath();
  let started = false;
  for (const [px, py] of pts) {
    const p = xfm(px * mirrorX, py, faceZ, spinA, tiltA);
    if (!p) continue;
    if (!started) { ctx.moveTo(p[0], p[1]); started = true; }
    else ctx.lineTo(p[0], p[1]);
  }
}

// ── Ambient background glow behind coin ──────────────────────────────────
function drawGlow(cosSpin) {
  const glowR = R * (1.35 + 0.05 * Math.abs(cosSpin));
  const g = ctx.createRadialGradient(CX, CY, R * 0.5, CX, CY, glowR);
  g.addColorStop(0,   `rgba(0,255,255,${(0.04 * Math.abs(cosSpin)).toFixed(4)})`);
  g.addColorStop(0.6, 'rgba(0,255,255,0.012)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// ── Coin face ─────────────────────────────────────────────────────────────
function drawFace(faceZ, spinA, tiltA, isFront, eyeAlpha) {
  const mirrorX = isFront ? 1 : -1;

  // Filled disc (occludes everything behind)
  polyPath(RIM_PTS, faceZ, spinA, tiltA, 1);
  ctx.closePath();
  ctx.fillStyle = 'rgba(3,5,9,0.98)';
  ctx.fill();

  // Rim circle (thin cyan border)
  const rimA = 0.22 + Math.abs(eyeAlpha) * 0.32;
  ctx.strokeStyle = `rgba(0,255,255,${rimA.toFixed(3)})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  if (eyeAlpha < 0.025) return;

  // Eye lines: brightness driven by face-facing angle
  const ea = Math.min(1, eyeAlpha * 1.35);
  const lw = 1.1 + eyeAlpha * 2.4;

  // Glow when near full frontal
  if (eyeAlpha > 0.65) {
    ctx.shadowColor = 'rgba(0,255,255,0.7)';
    ctx.shadowBlur  = 10 * eyeAlpha;
  }

  ctx.strokeStyle = `rgba(0,255,255,${ea.toFixed(3)})`;
  ctx.lineWidth   = lw;
  polyPath(EYE_PTS, faceZ, spinA, tiltA, mirrorX);
  ctx.closePath();
  ctx.stroke();

  ctx.lineWidth = lw * 0.82;
  polyPath(IRIS_PTS, faceZ, spinA, tiltA, mirrorX);
  ctx.closePath();
  ctx.stroke();

  ctx.lineWidth = lw * 0.65;
  polyPath(PUPIL_PTS, faceZ, spinA, tiltA, mirrorX);
  ctx.closePath();
  ctx.stroke();

  ctx.shadowBlur = 0;
}

// ── Coin edge ─────────────────────────────────────────────────────────────
// Only the camera-facing quads are drawn.
// Visibility check: edge outward normal (cos(aMid), sin(aMid), 0) in coin-local,
// after Y-rotation → z component = -cos(aMid) * sin(spinA).
// Facing camera requires this z-component > 0.
// Diffuse shading from a gentle overhead light (0, 0.9, 0.3).

function drawEdge(spinA, tiltA) {
  const N = 96;
  for (let i = 0; i < N; i++) {
    const a1 = (i / N) * Math.PI * 2;
    const a2 = ((i + 1) / N) * Math.PI * 2;
    const am = (a1 + a2) / 2;

    const nx = Math.cos(am), ny = Math.sin(am);

    // Camera-facing check (z of rotated normal)
    const normalCamZ = -nx * Math.sin(spinA);
    if (normalCamZ <= 0) continue;

    // Diffuse light from (0, 0.9, 0.3) normalized — top-front light
    // Rotated normal: [nx*cos(spinA), ny, -nx*sin(spinA)]
    const rnx = nx * Math.cos(spinA), rny = ny, rnz = -nx * Math.sin(spinA);
    const diffuse = Math.max(0, rny * 0.9 + rnz * 0.3);
    const shade   = 0.12 + diffuse * 0.45;

    const c1 = xfm(Math.cos(a1), Math.sin(a1), ZF, spinA, tiltA);
    const c2 = xfm(Math.cos(a2), Math.sin(a2), ZF, spinA, tiltA);
    const c3 = xfm(Math.cos(a2), Math.sin(a2), ZB, spinA, tiltA);
    const c4 = xfm(Math.cos(a1), Math.sin(a1), ZB, spinA, tiltA);
    if (!c1 || !c2 || !c3 || !c4) continue;

    ctx.beginPath();
    ctx.moveTo(c1[0], c1[1]);
    ctx.lineTo(c2[0], c2[1]);
    ctx.lineTo(c3[0], c3[1]);
    ctx.lineTo(c4[0], c4[1]);
    ctx.closePath();

    // Fill with very dark cyan-tinted color
    ctx.fillStyle   = `rgba(0,18,22,0.97)`;
    ctx.fill();
    ctx.strokeStyle = `rgba(0,255,255,${(shade * normalCamZ).toFixed(3)})`;
    ctx.lineWidth   = 0.5;
    ctx.stroke();
  }
}

// ── Render loop ───────────────────────────────────────────────────────────
let t0 = 0;
let smoothTilt = 0;

function loop(ts) {
  if (!t0) t0 = ts;
  const time = (ts - t0) / 1000;

  // Smooth mouse tilt (X-axis)
  smoothTilt += (myN * 0.22 - smoothTilt) * 0.05;

  // Spin: constant velocity + small mouse-X nudge
  const spinA  = 0.74 * time + mxN * 0.45;
  const tiltA  = smoothTilt;
  const cosSpin = Math.cos(spinA);

  ctx.clearRect(0, 0, W, H);

  // Ambient glow ring behind the coin
  drawGlow(cosSpin);

  // Front-face alpha: max(0, cos(spinA)) — visible only when front faces camera
  // Back-face  alpha: max(0, −cos(spinA)) — visible only when back faces camera
  const frontA = Math.max(0, cosSpin);
  const backA  = Math.max(0, -cosSpin);

  // Depth order: farthest face first, edge quads, nearest face last
  if (cosSpin >= 0) {
    // Front face is closer to camera
    drawFace(ZB, spinA, tiltA, false, backA);  // back face (far)
    drawEdge(spinA, tiltA);
    drawFace(ZF, spinA, tiltA, true,  frontA); // front face (near)
  } else {
    // Back face is closer to camera
    drawFace(ZF, spinA, tiltA, true,  frontA); // front face (far)
    drawEdge(spinA, tiltA);
    drawFace(ZB, spinA, tiltA, false, backA);  // back face (near)
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
